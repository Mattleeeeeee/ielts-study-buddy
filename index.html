<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IELTS Study Buddy</title>

<link rel="apple-touch-icon" href="heart_app_icon.png">
<link rel="icon" href="heart_app_icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Study Buddy 💖">

<meta name="theme-color" content="#ffb7d5">

<style>
:root {
  --bg:#f7fbff; --card:#fffafb; --pink:#ffb7d5; --pink-strong:#e96aa7; --blue:#d9edff;
  --blue-strong:#5b95e6; --deep:#2b4367; --lav:#efe7ff; --peach:#ffe9db; --mint:#dff7e8;
  --border:#e8dfea; --text:#26364d; --muted:#6d7b8f; --danger:#d65277; --success:#2ea66b;
  --shadow:0 10px 25px rgba(61,92,136,0.08); --radius:22px;
}
* { box-sizing:border-box; }
html,body { margin:0; padding:0; background:linear-gradient(180deg,var(--bg),#eef5ff 45%,#fff5fb 100%); color:var(--text); font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; }
body { min-height:100vh; }
.app { max-width:1280px; margin:0 auto; padding:14px; }
.hero { background:linear-gradient(135deg,#3966a7,#76a9ef 58%,#f099c2); color:white; border-radius:28px; padding:18px 18px 16px; box-shadow:var(--shadow); position:sticky; top:0; z-index:10; transition:all .2s ease; }
.hero.minimized { padding:10px 12px; }
.hero.minimized .subtitle, .hero.minimized .stats { display:none; }
.hero.minimized .tabs { padding-top:8px; }
.hero-top { display:flex; gap:12px; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; }
.title { font-size:clamp(1.6rem,4vw,2.4rem); font-weight:800; }
.subtitle { opacity:.95; margin-top:6px; font-size:.95rem; }
.stats { display:flex; gap:10px; flex-wrap:wrap; }
.pill { background:rgba(255,255,255,.2); backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,.25); padding:10px 12px; border-radius:999px; font-size:.9rem; font-weight:700; }
.tabs { display:flex; gap:8px; overflow:auto; padding-top:14px; }
.tab { border:none; border-radius:999px; padding:11px 14px; white-space:nowrap; background:rgba(255,255,255,.18); color:white; font-weight:700; cursor:pointer; }
.tab.active { background:white; color:var(--deep); }
.page { display:none; padding:16px 0; }
.page.active { display:block; }
.grid { display:grid; gap:16px; }
.grid.two { grid-template-columns:330px minmax(0,1fr); }
.grid.store { grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); }
.split { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media (max-width: 900px) { .grid.two, .split { grid-template-columns:1fr; } }
.card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; }
.card h2,.card h3,.card h4 { margin:0 0 10px; }
.muted { color:var(--muted); }
.section-title { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
.btn { border:none; border-radius:14px; padding:11px 14px; font-weight:800; cursor:pointer; background:var(--blue-strong); color:#fff; box-shadow:var(--shadow); }
.btn.secondary { background:var(--pink-strong); }
.btn.ghost { background:#fff; color:var(--deep); border:1px solid var(--border); }
.btn.success { background:var(--success); }
.btn.danger { background:var(--danger); }
.btn.small { padding:8px 10px; border-radius:12px; font-size:.92rem; }
.btn:disabled { opacity:.55; cursor:not-allowed; }
.row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.list { display:flex; flex-direction:column; gap:8px; max-height:70vh; overflow:auto; padding-right:4px; }
.item { border:1px solid var(--border); background:#fff; border-radius:16px; padding:12px; cursor:pointer; }
.item.selected { outline:2px solid var(--blue-strong); background:#f9fcff; }
.item .sub { font-size:.9rem; color:var(--muted); margin-top:3px; }
.badge { display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding:6px 10px; font-size:.82rem; font-weight:800; }
.badge.pink { background:#fff1f7; color:var(--pink-strong); }
.badge.blue { background:#eef6ff; color:var(--blue-strong); }
.badge.green { background:#eefaf4; color:var(--success); }
.progress { width:100%; height:12px; background:#edf1f7; border-radius:999px; overflow:hidden; }
.progress > div { height:100%; background:linear-gradient(90deg,var(--pink-strong),var(--blue-strong)); border-radius:999px; }
.word { text-align:center; font-size:clamp(2rem,6vw,3.2rem); font-weight:900; margin:4px 0 6px; }
.meta { text-align:center; color:var(--muted); margin-bottom:12px; }
.flash-content p { margin:.55rem 0; }
.flash-content .label { font-weight:800; color:var(--deep); }
.option { width:100%; text-align:left; border:1px solid var(--border); background:#fff; padding:12px 14px; border-radius:16px; margin-bottom:10px; cursor:pointer; }
.option.selected { outline:2px solid var(--pink-strong); background:#fff7fb; }
.archive-item { padding:12px; border-radius:16px; border:1px solid var(--border); background:#fff; }
.store-card { display:flex; flex-direction:column; gap:10px; }
.store-emoji { font-size:2rem; }
.empty { padding:18px; border:1px dashed var(--border); border-radius:18px; background:#fff; }
.search { width:100%; padding:12px 14px; border-radius:14px; border:1px solid var(--border); background:#fff; }
.icon-box { width:44px; height:44px; border-radius:14px; display:grid; place-items:center; background:#fff; border:1px solid var(--border); }
.small { font-size:.92rem; }
.success-text { color:var(--success); font-weight:700; }
.danger-text { color:var(--danger); font-weight:700; }
.toggle { display:flex; align-items:center; gap:10px; }
</style>
</head>
<body>
<div class="app">
  <header class="hero" id="hero">
    <div class="hero-top">
      <div>
        <div class="title">IELTS Study Buddy 💖</div>
        <div class="subtitle">Cute study app with chapters, flashcards, tests, weak words, archive, and rewards.</div>
      </div>
      <div class="row">
        <button class="btn ghost small" id="toggleHeroBtn" style="background:rgba(255,255,255,.18);color:white;border-color:rgba(255,255,255,.28)">Hide header</button>
        <div class="stats">
          <div class="pill" id="statWords">🌟 0 / 0 memorized</div>
          <div class="pill" id="statChapters">📘 0 / 0 chapters</div>
          <div class="pill" id="statPoints">🪙 0 points</div>
        </div>
      </div>
    </div>
    <nav class="tabs" id="tabs"></nav>
  </header>

  <main>
    <section class="page active" id="page-home"></section>
    <section class="page" id="page-daily"></section>
    <section class="page" id="page-chapters"></section>
    <section class="page" id="page-flashcards"></section>
    <section class="page" id="page-tests"></section>
    <section class="page" id="page-archive"></section>
    <section class="page" id="page-store"></section>
  </main>
</div>

function addWeakWord(word, amount=1){ if (word) state.weakWords[word] = (state.weakWords[word] || 0) + amount; }
function reduceWeakWord(word, amount=1){ if (!word || !state.weakWords[word]) return; state.weakWords[word] = Math.max(0, state.weakWords[word]-amount); if (!state.weakWords[word]) delete state.weakWords[word]; }

function weightedWeakSelection(words, count){
  if (!words.length) return [];
  const pool = [];
  for (const w of words){
    const weight = 1 + Math.min(4, state.weakWords[w.word] || 0);
    for (let i = 0; i < weight; i++) pool.push(w);
  }
  const chosen = [];
  const seen = new Set();
  for (const w of [...pool].sort(() => Math.random() - 0.5)){
    if (!seen.has(w.id)){
      seen.add(w.id);
      chosen.push(w);
      if (chosen.length >= Math.min(count, words.length)) break;
    }
  }
  if (chosen.length < Math.min(count, words.length)){
    for (const w of randomFrom(words, count)){
      if (!seen.has(w.id)){
        seen.add(w.id);
        chosen.push(w);
      }
    }
  }
  return chosen;
}

  return { vocabCount, formCount };
}

async function fetchJsonWithFallback(url){
  const urls = [url, `https://cors.isomorphic-git.org/${url}`];
  for (const candidate of urls){
    try {
      const res = await fetch(candidate, {cache:"no-store"});
      if (!res.ok) continue;
      return await res.json();
    } catch (e) { console.log("fetch failed", candidate, e); }
  }
  return null;
}
async function fetchTranslation(text){
  if (!text) return "";
  const data = await fetchJsonWithFallback(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q=${encodeURIComponent(text)}`);
  if (Array.isArray(data) && Array.isArray(data[0])) return data[0].map(part => Array.isArray(part) ? (part[0] || "") : "").join("").trim();
  return "";
}
async function fetchDictionaryData(word){
  const wordObj = state.words.find(w => w.word === word);
  if (!wordObj) return null;
  if (wordObj.definition && wordObj.zhTW && wordObj.partOfSpeech && wordObj.example) return wordObj;
  try {
    const data = await fetchJsonWithFallback(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
    if (Array.isArray(data) && data[0]) {
      const entry = data[0];
      const meanings = entry.meanings || [];
      let pos = [], defs = [], example = "";
      for (const m of meanings){
        if (m.partOfSpeech && !pos.includes(m.partOfSpeech)) pos.push(m.partOfSpeech);
        for (const d of (m.definitions || []).slice(0,3)){
          if (d.definition) defs.push(d.definition);
          if (!example && d.example) example = d.example;
        }
      }
      if (!wordObj.partOfSpeech) wordObj.partOfSpeech = pos.join(" / ");
      if (!wordObj.definition) wordObj.definition = defs[0] || "";
      if (!wordObj.example) wordObj.example = example || "";
    }
    if (!wordObj.zhTW && wordObj.definition){
      const zh = await fetchTranslation(wordObj.definition);
      if (zh) wordObj.zhTW = zh;
    }
    saveState();
    return wordObj;
  } catch (e) {
    console.log("Dictionary lookup failed", e);
    return wordObj;
  }
}
function randomFrom(arr, n){ return [...arr].sort(() => Math.random() - 0.5).slice(0, Math.min(n, arr.length)); }
async function ensureDefinitions(words, limit=8){
  const missing = words.filter(w => !w.definition).slice(0, limit);
  for (const w of missing) await fetchDictionaryData(w.word);
}
function shuffle(arr){ return [...arr].sort(() => Math.random() - 0.5); }

function uniqueStrings(arr){
  const seen = new Set();
  const out = [];
  for (const item of arr){
    const val = String(item || "").trim();
    if (!val) continue;
    const key = val.toLowerCase();
    if (!seen.has(key)){
      seen.add(key);
      out.push(val);
    }
  }
  return out;
}
function normalizeWordForm(value){
  return String(value || "").trim().toLowerCase().replace(/[^a-z]/g, "");
}
function similarWordVariants(baseWord){
  const base = normalizeWordForm(baseWord);
  if (!base) return [];
  const variants = uniqueStrings([
    baseWord,
    base + "s",
    base + "ed",
    base + "ing",
    base.endsWith("e") ? base.slice(0, -1) + "ing" : "",
    base.endsWith("y") ? base.slice(0, -1) + "ied" : "",
    base.endsWith("y") ? base.slice(0, -1) + "ies" : "",
    base + "er",
    base + "est"
  ]);
  return variants.filter(v => normalizeWordForm(v) !== base);
}
function ensureFourOptions(correct, options, fallbackPool){
  let out = uniqueStrings([correct, ...options]);
  const used = new Set(out.map(x => x.toLowerCase()));
  for (const item of uniqueStrings(fallbackPool)){
    const val = String(item || "").trim();
    if (!val) continue;
    const key = val.toLowerCase();
    if (!used.has(key)){
      used.add(key);
      out.push(val);
      if (out.length >= 4) break;
    }
  }
  if (!used.has(String(correct).toLowerCase())){
    out.unshift(correct);
  }
  return shuffle(uniqueStrings(out).slice(0, Math.min(4, uniqueStrings(out).length)));
}
function padOptionsUnique(correct, wrongPool, fallbackPool, desired=4){
  let options = uniqueStrings([correct, ...wrongPool]);
  const used = new Set(options.map(x => x.toLowerCase()));
  for (const item of uniqueStrings(fallbackPool)){
    const val = String(item || "").trim();
    if (!val) continue;
    const key = val.toLowerCase();
    if (!used.has(key)){
      used.add(key);
      options.push(val);
      if (options.length >= desired) break;
    }
  }
  if (!used.has(String(correct).toLowerCase())){
    options.unshift(correct);
  }
  options = uniqueStrings(options);
  if (options.length < desired){
    options = ensureFourOptions(correct, options, fallbackPool);
  } else {
    options = shuffle(options.slice(0, desired));
  }
  return options;
}
function escapeHtml(s){ return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;"); }

function buildDefinitionQuiz(words, count=10){
  const usable = words.filter(w => w.definition);
  const sample = randomFrom(usable, count);
  const allDefs = uniqueStrings(state.words.map(w => w.definition).filter(Boolean));
  return sample.map(word => {
    const wrongPool = randomFrom(allDefs.filter(d => d.toLowerCase() !== String(word.definition).toLowerCase()), 12);
    const options = ensureFourOptions(word.definition, wrongPool, allDefs);
    return {
      id: crypto.randomUUID(),
      prompt: `What is the best definition of '${word.word}'?`,
      options,
      correctAnswer: word.definition,
      explanation: `'${word.word}' means: ${word.definition}`,
      correctAnswerZhTW: word.zhTW || ""
    };
  });
}
function buildFormQuiz(words, count=5){
  const candidates = words.filter(w => w.forms && w.forms.past);
  const globalWords = uniqueStrings(state.words.map(w => w.word).filter(Boolean));
  return randomFrom(candidates, count).map(word => {
    const correct = word.forms.past;
    const nearVariants = uniqueStrings([
      word.word,
      word.forms.ing,
      word.forms.third_person,
      word.forms.plural,
      ...similarWordVariants(word.word)
    ]).filter(x => normalizeWordForm(x) !== normalizeWordForm(correct));

    const relatedPool = uniqueStrings([
      ...nearVariants,
      ...randomFrom(globalWords.filter(x => normalizeWordForm(x) !== normalizeWordForm(correct) && normalizeWordForm(x) !== normalizeWordForm(word.word)), 10)
    ]);

    const options = padOptionsUnique(correct, relatedPool, [...similarWordVariants(word.word), ...globalWords], 4);
    return {
      id: crypto.randomUUID(),
      prompt: `Choose the correct past form of '${word.word}'.`,
      options,
      correctAnswer: correct,
      explanation: `Trusted local forms: past form of '${word.word}' is '${correct}'.`,
      correctAnswerZhTW: ""
    };
  });
}

function buildMeaningRecallQuiz(words, count=5){
  const candidates = words.filter(w => w.definition);
  const allWords = uniqueStrings(candidates.map(w => w.word).filter(Boolean));
  return randomFrom(candidates, count).map(word => {
    const correct = word.word;
    const wrongPool = randomFrom(allWords.filter(w => w.toLowerCase() !== String(correct).toLowerCase()), 12);
    const options = ensureFourOptions(correct, wrongPool, allWords);
    return {
      id: crypto.randomUUID(),
      prompt: `Which word matches this definition: '${word.definition}'?`,
      options,
      correctAnswer: correct,
      explanation: `'${correct}' matches the definition: ${word.definition}`,
      correctAnswerZhTW: word.zhTW || ""
    };
  });
}

function pointsFor(score, total, title){
  if (!total) return 0;
  const ratio = score / total;
  let pts = 0;
  if (title === "Daily Test") {
    if (ratio >= 0.9) pts = 11; else if (ratio >= 0.8) pts = 9; else if (ratio >= 0.65) pts = 7; else if (ratio >= 0.5) pts = 5; else pts = 3;
  } else if (title === "Mock Test") {
    if (ratio >= 0.9) pts = 26; else if (ratio >= 0.8) pts = 22; else if (ratio >= 0.65) pts = 17; else if (ratio >= 0.5) pts = 12; else pts = 7;
  } else {
    if (ratio >= 0.9) pts = 14; else if (ratio >= 0.8) pts = 12; else if (ratio >= 0.65) pts = 9; else if (ratio >= 0.5) pts = 6; else pts = 4;
  }
  return pts;
}
function rewardReason(score,total,title){
  if (!total) return "No points";
  const r = score / total;
  let label = "Effort reward";
  if (r >= .9) label = "Excellent"; else if (r >= .8) label = "Great"; else if (r >= .65) label = "Good"; else if (r >= .5) label = "Solid effort";
  return `${label} in ${title}`;
}


function fixQuizOptionQuality(quiz){
  return quiz.map(q => {
    const opts = uniqueStrings(q.options || []);
    if (opts.length >= 4) {
      q.options = shuffle(opts.slice(0, 4));
      return q;
    }
    q.options = ensureFourOptions(q.correctAnswer, opts.filter(x => x !== q.correctAnswer), state.words.map(w => w.word || w.definition).filter(Boolean));
    return q;
  });
}

function scoreQuiz(){
  const total = ui.currentQuiz.length;
  let score = 0;
  const details = ui.currentQuiz.map(q => {
    const yourAnswer = ui.quizAnswers[q.id] || "";
    const ok = yourAnswer === q.correctAnswer;
    const match = q.prompt.match(/'([^']+)'/);
    const word = match ? match[1] : "";
    if (ok) { score++; reduceWeakWord(word, 1); } else { addWeakWord(word, 1); }
    return {
      id: crypto.randomUUID(),
      question: q.prompt,
      yourAnswer,
      yourAnswerZhTW: translateSmall(yourAnswer),
      correctAnswer: q.correctAnswer,
      correctAnswerZhTW: q.correctAnswerZhTW || translateSmall(q.correctAnswer),
      explanation: q.explanation,
      isCorrect: ok
    };
  });
  const ratio = total ? score / total : 0;
  state.recentScores.push(ratio);
  if (state.recentScores.length > 5) state.recentScores.shift();
  const avg = state.recentScores.reduce((a,b)=>a+b,0) / Math.max(1, state.recentScores.length);
  if (avg >= 0.8 && state.skillLevel < 3) state.skillLevel++;
  else if (avg <= 0.5 && state.skillLevel > 1) state.skillLevel--;

  const pts = pointsFor(score, total, ui.currentQuizTitle);
  state.points += pts;
  if (ui.currentQuizTitle === "Daily Test") state.dailyTestDone = true;
  state.lastEncouragement = `🎁 +${pts} points • ${rewardReason(score, total, ui.currentQuizTitle)} • ${getSkillLabel()}`;
  state.archive.unshift({ id: crypto.randomUUID(), title: ui.currentQuizTitle, takenAt: new Date().toISOString(), score, total, pointsEarned: pts, details });
  saveState();

  const record = state.archive[0];
  ui.currentQuiz = [];
  ui.quizAnswers = {};
  renderTests(`🎉 Finished! Score: ${score}/${total} • +${pts} points • ${getSkillLabel()}`);
  if (currentPage() === "archive") renderArchive(record.id);
  if (currentPage() === "store") renderStore();
  if (currentPage() === "home") renderHome();
}

function getDailyWords(){
  if (ui.dailyWords && ui.dailyWords.length) return ui.dailyWords;
  const weakCandidates = sortedWeakWordEntries(50).map(([w]) => state.words.find(x => x.word === w)).filter(Boolean);
  const weakSample = randomFrom(weakCandidates, Math.min(8, weakCandidates.length));
  const used = new Set(weakSample.map(w => w.id));
  const remaining = state.words.filter(w => !w.isMemorized && !used.has(w.id));
  ui.dailyWords = [...weakSample, ...randomFrom(remaining.length ? remaining : state.words.filter(w => !used.has(w.id)), 20 - weakSample.length)];
  if (!ui.selectedDailyWordId && ui.dailyWords[0]) ui.selectedDailyWordId = ui.dailyWords[0].id;
  return ui.dailyWords;
}

function translateSmall(text){
  if (!text) return "";
  const map = {
    "to examine something carefully in detail":"仔細分析某事",
    "an advantage or something that helps you":"優點；有幫助的事",
    "a method or way of doing something":"方法",
    "the situation or background around something":"背景；語境",
    "to become better or make something better":"改善；進步",
    "to happen":"發生",
    "to recognize or name something":"辨認；確認",
    "an official plan or set of rules":"政策",
    "important or large enough to be noticed":"重要的；顯著的",
    "one part of something larger":"部分；章節"
  };
  return map[text] || "";
}

      if (ui.selectedDailyWordId && ui.selectedDailyWordId !== nextWord.id) ui.dailyHistory.push(ui.selectedDailyWordId);
      ui.selectedDailyWordId = nextWord.id;
      await fetchDictionaryData(nextWord.word);
      renderDaily();
    };
  }
}

function renderChapters(){
  document.getElementById("page-chapters").innerHTML = `
    <div class="grid two">
      <div class="card"><h2>Chapter Journey 📘</h2><div class="list">${state.chapters.map(c => { const words = chapterWords(c.id), memorized = words.filter(w => w.isMemorized).length; return `<div class="item ${ui.selectedChapter === c.id ? "selected" : ""}" data-chapter="${c.id}"><div><strong>${c.isCompleted ? "✅" : "🌱"} ${c.title}</strong></div><div class="sub">${c.summary}</div><div class="sub">Memorized in this chapter: ${memorized}/${words.length}</div></div>`; }).join("")}</div></div>
      <div class="card" id="chapterDetail"></div>
    </div>`;
  document.querySelectorAll("[data-chapter]").forEach(el => el.onclick = () => { ui.selectedChapter = Number(el.dataset.chapter); renderChapters(); });
  const c = state.chapters.find(c => c.id === ui.selectedChapter) || state.chapters[0];
  const words = chapterWords(c.id), memorized = words.filter(w => w.isMemorized).length;
  document.getElementById("chapterDetail").innerHTML = `<div class="section-title"><h2>${c.title}</h2><span class="badge ${c.isCompleted ? "green" : "blue"}">${c.isCompleted ? "Completed ✅" : "In progress 🌱"}</span></div><p>${c.summary}</p><div class="badge pink">Memorized in this chapter: ${memorized}/${words.length}</div><div class="row" style="margin-top:12px"><button class="btn secondary" id="chapterDone">Mark chapter completed</button><button class="btn" id="chapterQuiz">Start chapter test</button><button class="btn ghost" id="chapterFlash">Open flashcards</button></div><div style="margin-top:16px" class="grid">${c.grammarNotes.map(n => `<div class="card" style="padding:14px"><h3>${n.title}</h3><p><strong>When to use:</strong> ${n.whenToUse}</p><p><strong>Form:</strong> ${n.form}</p><p><strong>Examples:</strong><br>${n.examples.map(e => `• ${e}`).join("<br>")}</p></div>`).join("")}</div>`;
  document.getElementById("chapterDone").onclick = () => markChapterDone(c.id);
  document.getElementById("chapterQuiz").onclick = async () => { setPage("tests"); renderTests("Building chapter test..."); await buildQuizForChapter(c.id); renderTests(); };
  document.getElementById("chapterFlash").onclick = () => { ui.selectedChapter = c.id; setPage("flashcards"); };
}

function renderFlashcards(){
  const words = chapterWords(ui.selectedChapter);
  const filtered = words.filter(w => w.word.includes(ui.flashSearch.toLowerCase()));
  const totalPages = Math.max(1, Math.ceil(filtered.length / ui.flashPageSize));
  if (ui.flashPage > totalPages) ui.flashPage = totalPages;
  const startIdx = (ui.flashPage - 1) * ui.flashPageSize;
  const visibleWords = filtered.slice(startIdx, startIdx + ui.flashPageSize);
  if (!ui.selectedWordId || !words.find(w => w.id === ui.selectedWordId)) ui.selectedWordId = words[0]?.id || null;
  const selected = findWord(ui.selectedWordId);

  if (selected && (!selected.definition || !selected.zhTW || !selected.partOfSpeech || !selected.example)) {
    fetchDictionaryData(selected.word).then(() => {
      const refreshed = findWord(ui.selectedWordId);
      if (refreshed && refreshed.word === selected.word) renderFlashcards();
    });
  }

  document.getElementById("page-flashcards").innerHTML = `
    <div class="grid">
      <div class="card"><div class="section-title"><h2>Vocabulary Garden 🌟</h2><div class="row"><select id="flashChapterSelect" class="btn ghost small">${state.chapters.map(c => `<option value="${c.id}" ${c.id === ui.selectedChapter ? "selected" : ""}>Chapter ${c.id}</option>`).join("")}</select><button class="btn small" id="weakWordBtn">🧠 Weak words</button><button class="btn secondary small" id="surpriseWord">🎁 Surprise me</button></div></div><div class="progress"><div style="width:${Math.round(memorizedCount()/Math.max(1,state.words.length)*100)}%"></div></div><p class="small muted">${memorizedCount()} / ${state.words.length} words memorized • 5000-word library • ${getSkillLabel()}</p></div>
      <div class="card">
        ${selected ? `<div class="badge pink">💖 Focus Card</div><div class="word">${selected.word}</div><div class="meta">${selected.partOfSpeech || "Loading word details..."}</div><div class="row" style="justify-content:center;margin-bottom:14px"><div class="toggle"><input type="checkbox" id="toggleMem" ${selected.isMemorized ? "checked" : ""}/><label for="toggleMem"><strong>Mark as memorized</strong></label></div><button class="btn ghost small" id="prevCardBtn">← Previous</button><button class="btn small" id="nextCardBtn">Next card →</button></div><div class="flash-content"><p><span class="label">Definition:</span><br>${selected.definition || "Loading definition..."}</p><p><span class="label">繁體中文:</span><br>${selected.zhTW || "Loading translation..."}</p><p><span class="label">Example sentence:</span><br>${selected.example || "Loading example sentence..."}</p><p><span class="label">Word forms:</span><br>${Object.keys(selected.forms || {}).length ? Object.entries(selected.forms).map(([k,v]) => `• ${k.replaceAll("_"," ")}: ${v}`).join("<br>") : "• Base form only"}</p>${(!selected.definition || !selected.zhTW || !selected.example || !selected.partOfSpeech) ? `<div class="row" style="margin-top:10px"><button class="btn small" id="retryWordLoad">Reload word details</button></div>` : ``}</div>` : `<div class="empty">No word selected.</div>`}
      </div>
      <div class="card"><div class="section-title"><h3>Vocabulary List</h3><button class="btn small" id="toggleList">${ui.listCollapsed ? "Show" : "Hide"}</button></div><input class="search" id="flashSearch" placeholder="Search word..." value="${escapeHtml(ui.flashSearch)}" /><div class="row" style="margin:10px 0"><button class="btn secondary small" id="markSelected">✅ Mark selected</button><button class="btn small" id="unmarkSelected">↩ Unmark selected</button><span class="badge blue">Page ${ui.flashPage} / ${totalPages}</span></div><div class="row" style="margin:0 0 10px 0"><button class="btn ghost small" id="prevFlashPage" ${ui.flashPage <= 1 ? "disabled" : ""}>← Prev</button><button class="btn ghost small" id="nextFlashPage" ${ui.flashPage >= totalPages ? "disabled" : ""}>Next →</button></div><div id="wordListWrap" style="display:${ui.listCollapsed ? "none" : "block"}"><div class="list">${visibleWords.length ? visibleWords.map(w => `<label class="item ${ui.selectedWordId === w.id ? "selected" : ""}"><div class="row"><input type="checkbox" data-pick="${w.id}" ${ui.flashSelection.has(w.id) ? "checked" : ""}/><div style="flex:1;cursor:pointer" data-openword="${w.id}"><div><strong>${w.isMemorized ? "✓" : "•"} ${w.word}</strong></div></div></div></label>`).join("") : `<div class="empty">No words match the search.</div>`}</div><p class="small muted" style="margin-top:10px">Showing ${visibleWords.length} words on this page • total matches: ${filtered.length}</p></div></div>
    </div>`;

  document.getElementById("flashChapterSelect").onchange = e => { ui.selectedChapter = Number(e.target.value); ui.flashSelection.clear(); ui.flashSearch = ""; ui.flashPage = 1; requestAnimationFrame(() => renderFlashcards()); };
  document.getElementById("toggleList").onclick = () => { ui.listCollapsed = !ui.listCollapsed; renderFlashcards(); };
  document.getElementById("flashSearch").oninput = e => { clearTimeout(ui.searchTimer); const value = e.target.value; ui.searchTimer = setTimeout(() => { ui.flashSearch = value; ui.flashPage = 1; renderFlashcards(); }, 180); };
  document.getElementById("weakWordBtn").onclick = async () => {
    const weakEntries = sortedWeakWordEntries(50);
    if (!weakEntries.length) return alert("No weak words tracked yet.");
    const weakWords = weakEntries.map(([w]) => state.words.find(x => x.word === w)).filter(Boolean);
    const target = weakWords[Math.floor(Math.random() * weakWords.length)];
    ui.selectedChapter = target.chapter;
    if (ui.selectedWordId && ui.selectedWordId !== target.id) ui.focusHistory.push(ui.selectedWordId);
    ui.selectedWordId = target.id;
    await fetchDictionaryData(target.word);
    renderFlashcards();
  };
  document.getElementById("surpriseWord").onclick = async () => {
    const remaining = state.words.filter(w => !w.isMemorized);
    const pool = remaining.length ? remaining : state.words;
    const target = pool[Math.floor(Math.random()*Math.max(1,pool.length))];
    ui.selectedChapter = target.chapter;
    if (ui.selectedWordId && ui.selectedWordId !== target.id) ui.focusHistory.push(ui.selectedWordId);
    ui.selectedWordId = target.id;
    await fetchDictionaryData(target.word);
    renderFlashcards();
  };
  const prevBtn = document.getElementById("prevFlashPage");
  const nextBtn = document.getElementById("nextFlashPage");
  if (prevBtn) prevBtn.onclick = () => { if (ui.flashPage > 1) { ui.flashPage--; renderFlashcards(); } };
  if (nextBtn) nextBtn.onclick = () => { if (ui.flashPage < totalPages) { ui.flashPage++; renderFlashcards(); } };
  document.querySelectorAll("[data-openword]").forEach(el => el.onclick = async () => {
    const id = el.dataset.openword;
    if (ui.selectedWordId && ui.selectedWordId !== id) ui.focusHistory.push(ui.selectedWordId);
    ui.selectedWordId = id;
    const wordObj = findWord(id);
    if (wordObj) await fetchDictionaryData(wordObj.word);
    renderFlashcards();
  });
  document.querySelectorAll("[data-pick]").forEach(el => el.onchange = () => { if (el.checked) ui.flashSelection.add(el.dataset.pick); else ui.flashSelection.delete(el.dataset.pick); });
  document.getElementById("markSelected").onclick = () => bulkMemorize(true);
  document.getElementById("unmarkSelected").onclick = () => bulkMemorize(false);
  if (selected) {
    document.getElementById("toggleMem").onchange = e => toggleMemorized(selected.id, e.target.checked);
    const retry = document.getElementById("retryWordLoad"); if (retry) retry.onclick = async () => { retry.disabled = true; retry.textContent = "Loading..."; await fetchDictionaryData(selected.word); renderFlashcards(); };
    document.getElementById("prevCardBtn").onclick = async () => {
      if (!ui.focusHistory.length) return;
      const prevId = ui.focusHistory.pop();
      const prevWord = findWord(prevId);
      if (!prevWord) return;
      ui.selectedWordId = prevId;
      const prevIndex = filtered.findIndex(w => w.id === prevId);
      if (prevIndex >= 0) ui.flashPage = Math.floor(prevIndex / ui.flashPageSize) + 1;
      await fetchDictionaryData(prevWord.word);
      renderFlashcards();
    };
    document.getElementById("nextCardBtn").onclick = async () => {
      const currentIndex = filtered.findIndex(w => w.id === selected.id);
      if (currentIndex === -1 || filtered.length === 0) return;
      const nextIndex = (currentIndex + 1) % filtered.length;
      const nextWord = filtered[nextIndex];
      if (ui.selectedWordId && ui.selectedWordId !== nextWord.id) ui.focusHistory.push(ui.selectedWordId);
      ui.selectedWordId = nextWord.id;
      ui.flashPage = Math.floor(nextIndex / ui.flashPageSize) + 1;
      await fetchDictionaryData(nextWord.word);
      renderFlashcards();
    };
  }
}

function renderTests(statusText=""){
  document.getElementById("page-tests").innerHTML = `<div class="grid"><div class="card"><div class="section-title"><h2>Tests 🎯</h2><span class="badge blue">${statusText || "Choose a test type • improved answer choices • " + getSkillLabel()}</span></div><div class="row"><select id="testChapterSelect" class="btn ghost small">${state.chapters.map(c => `<option value="${c.id}" ${c.id === ui.selectedChapter ? "selected" : ""}>Chapter ${c.id}</option>`).join("")}</select><button class="btn secondary" id="startChapterTest">Start chapter test</button><button class="btn" id="startMockTest">Start mock test</button><button class="btn ghost" id="startDailyTest2">Start daily test</button></div></div>${ui.currentQuiz.length ? `<div class="card"><div class="section-title"><h3>${ui.currentQuizTitle}</h3><span class="badge pink">${Object.keys(ui.quizAnswers).length}/${ui.currentQuiz.length} answered</span></div>${ui.currentQuiz.map((q, idx) => `<div class="card" style="margin:10px 0;padding:14px"><div class="question">${idx+1}. ${q.prompt}</div>${q.options.map(opt => `<button class="option ${ui.quizAnswers[q.id] === opt ? "selected" : ""}" data-q="${q.id}">${opt}</button>`).join("")}</div>`).join("")}<div><button class="btn success" id="submitQuiz">✅ Submit test</button></div></div>` : `<div class="empty">No test is active yet.</div>`}</div>`;
  document.getElementById("testChapterSelect").onchange = e => ui.selectedChapter = Number(e.target.value);
  document.getElementById("startChapterTest").onclick = async () => {
    renderTests("Building chapter test...");
    try {
      await buildQuizForChapter(ui.selectedChapter);
      renderTests();
    } catch (err) {
      renderTests(err.message);
    }
  };
  document.getElementById("startMockTest").onclick = async () => {
    renderTests("Building mock test...");
    try {
      await buildMockQuiz();
      renderTests();
    } catch (err) {
      renderTests(err.message);
    }
  };
  document.getElementById("startDailyTest2").onclick = async () => {
    renderTests("Building daily test...");
    try {
      if (!ui.dailyWords.length) getDailyWords();
      await buildDailyQuiz();
      renderTests();
    } catch (err) {
      renderTests(err.message);
    }
  };
  document.querySelectorAll("[data-q]").forEach(btn => btn.onclick = () => { ui.quizAnswers[btn.dataset.q] = btn.textContent; renderTests(statusText); });
  const submit = document.getElementById("submitQuiz"); if (submit) submit.onclick = scoreQuiz;
}

function renderArchive(preselectId=null){
  if (preselectId) ui.selectedArchiveId = preselectId;
  if (!ui.selectedArchiveId && state.archive[0]) ui.selectedArchiveId = state.archive[0].id;
  const selected = state.archive.find(r => r.id === ui.selectedArchiveId) || null;
  document.getElementById("page-archive").innerHTML = `<div class="grid two"><div class="card"><div class="section-title"><h2>Saved tests 📊</h2></div><div class="list">${state.archive.length ? state.archive.map(r => `<div class="archive-item ${r.id === ui.selectedArchiveId ? "selected item" : ""}" data-record="${r.id}"><div><strong>${r.title}</strong></div><div class="sub">${new Date(r.takenAt).toLocaleString()}</div><div class="sub">${r.score}/${r.total} • +${r.pointsEarned} points</div></div>`).join("") : `<div class="empty">No saved tests yet.</div>`}</div></div><div class="card">${selected ? `<div class="section-title"><h2>${selected.title}</h2><button class="btn danger small" id="deleteRecord">Delete test</button></div><p class="muted">${new Date(selected.takenAt).toLocaleString()} • Score ${selected.score}/${selected.total} • +${selected.pointsEarned} points</p><div class="grid">${selected.details.map((d, idx) => `<div class="card" style="padding:14px"><div class="${d.isCorrect ? "success-text" : "danger-text"}">${d.isCorrect ? "✅ Correct" : "✗ Wrong"}</div><p><strong>Q${idx+1}.</strong> ${d.question}</p><p><strong>Your answer:</strong> ${d.yourAnswer || "<span class='muted'>No answer</span>"}</p>${d.yourAnswerZhTW ? `<p class="muted"><strong>你的答案（繁中）:</strong> ${d.yourAnswerZhTW}</p>` : ""}<p><strong>Correct answer:</strong> ${d.correctAnswer}</p>${d.correctAnswerZhTW ? `<p class="muted"><strong>正確答案（繁中）:</strong> ${d.correctAnswerZhTW}</p>` : ""}<p><strong>Explanation:</strong> ${d.explanation}</p></div>`).join("")}</div>` : `<div class="empty">Select a saved test to review it.</div>`}</div></div>`;
  document.querySelectorAll("[data-record]").forEach(el => el.onclick = () => { ui.selectedArchiveId = el.dataset.record; renderArchive(); });
  const del = document.getElementById("deleteRecord"); if (del) del.onclick = () => { if (confirm("Delete this saved test?")) deleteRecord(selected.id); };
}

function renderStore(){
  document.getElementById("page-store").innerHTML = `<div class="grid"><div class="card"><div class="section-title"><h2>Rewards Store 🛍</h2><span class="badge pink">Current points: ${state.points} 🪙</span></div><p class="muted">Small rewards should take around a week of solid study. Medium rewards take more consistency.</p></div><div class="grid store">${state.storeItems.map(item => `<div class="card store-card"><div class="store-emoji">${item.emoji}</div><h3>${item.name}</h3><div class="muted">${item.note}</div><div class="badge blue">${item.cost} points</div><button class="btn" data-redeem="${item.id}">Redeem</button></div>`).join("")}</div><div class="card"><h3>Redeemed rewards 🎀</h3>${state.purchases.length ? state.purchases.map(p => `<div class="archive-item"><div class="section-title"><div><strong>${p.itemName}</strong><div class="sub">${new Date(p.purchasedAt).toLocaleString()}</div><div class="sub">-${p.cost} points</div></div><button class="btn danger small" data-delpurchase="${p.id}">Delete</button></div></div>`).join("") : `<div class="empty">No rewards redeemed yet.</div>`}</div></div>`;
  document.querySelectorAll("[data-redeem]").forEach(btn => btn.onclick = () => redeem(btn.dataset.redeem));
  document.querySelectorAll("[data-delpurchase]").forEach(btn => btn.onclick = () => deletePurchase(btn.dataset.delpurchase));
}

function renderAll(){ renderStats(); renderCurrentPage(currentPage()); }
renderTabs(); bindHeroToggle(); renderAll(); applyHeroState();
</script>
