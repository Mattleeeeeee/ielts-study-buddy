<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IELTS Study Buddy 💖</title>
<style>
body{font-family:Arial;margin:0;background:#f5f9ff}
.hero{background:linear-gradient(135deg,#6aa7ff,#ff9ecf);color:white;padding:12px;position:sticky;top:0}
.hero.small{padding:6px}
button{padding:8px 12px;margin:4px;border:none;border-radius:10px;background:#ff9ecf;color:white}
.card{background:white;margin:10px;padding:15px;border-radius:15px}
.word{font-size:28px;font-weight:bold;text-align:center}
.list{max-height:200px;overflow:auto}
.item{padding:6px;border-bottom:1px solid #eee;cursor:pointer}
.active{background:#ffe3f1}
</style>
</head>
<body>

<div id="hero" class="hero">
  <h3>IELTS Study Buddy 💖</h3>
  <button onclick="toggleHero()">Hide</button>
</div>

<div class="card">
  <input id="search" placeholder="Search..." style="width:100%;padding:8px"/>
  <div>
    <button onclick="prevPage()">Prev</button>
    <span id="pageInfo"></span>
    <button onclick="nextPage()">Next</button>
  </div>
  <div id="list" class="list"></div>
</div>

<div class="card">
  <div id="word" class="word">Select a word</div>
  <div id="def"></div>
  <div id="zh"></div>
</div>

<script>
let words = ["improve","benefit","analyze","method","research","develop","increase","reduce","effect","result"];
let state = {page:1, pageSize:5, search:"", selected:null, cache:{}};

function toggleHero(){
  document.getElementById("hero").classList.toggle("small");
}

function renderList(){
  const filtered = words.filter(w=>w.includes(state.search));
  const totalPages = Math.ceil(filtered.length/state.pageSize)||1;
  if(state.page>totalPages) state.page=totalPages;
  const start=(state.page-1)*state.pageSize;
  const pageWords = filtered.slice(start,start+state.pageSize);

  document.getElementById("pageInfo").innerText = state.page+" / "+totalPages;

  document.getElementById("list").innerHTML = pageWords.map(w=>
    `<div class="item ${state.selected===w?'active':''}" onclick="selectWord('${w}')">${w}</div>`
  ).join("");
}

function prevPage(){state.page--; if(state.page<1) state.page=1; renderList();}
function nextPage(){state.page++; renderList();}

let searchTimer;
document.getElementById("search").oninput = e=>{
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{
    state.search=e.target.value;
    state.page=1;
    renderList();
  },200);
};

async function selectWord(w){
  state.selected=w;
  renderList();

  if(state.cache[w]){
    display(state.cache[w]);
    return;
  }

  document.getElementById("word").innerText=w;
  document.getElementById("def").innerText="Loading...";
  document.getElementById("zh").innerText="";

  try{
    const res = await fetch("https://api.dictionaryapi.dev/api/v2/entries/en/"+w);
    const data = await res.json();
    const def = data[0]?.meanings[0]?.definitions[0]?.definition || "No definition";

    const tr = await fetch("https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q="+encodeURIComponent(def));
    const tdata = await tr.json();
    const zh = tdata[0][0][0];

    const result = {def, zh};
    state.cache[w]=result;
    display(result);

  }catch{
    display({def:"Failed to load", zh:""});
  }
}

function display(d){
  document.getElementById("def").innerText=d.def;
  document.getElementById("zh").innerText=d.zh;
}

renderList();
</script>

</body>
</html>
