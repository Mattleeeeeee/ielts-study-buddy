<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IELTS Study Buddy</title>
  <style>
    :root{
      --bg:#f7fbff;
      --card:#fffafd;
      --pink:#ffb7d5;
      --pink-strong:#e96aa7;
      --blue:#d9edff;
      --blue-strong:#5b95e6;
      --deep:#2b4367;
      --lav:#efe7ff;
      --peach:#ffe9db;
      --mint:#dff7e8;
      --border:#e8dfea;
      --text:#26364d;
      --muted:#6d7b8f;
      --danger:#d65277;
      --success:#2ea66b;
      --shadow:0 10px 25px rgba(61,92,136,0.08);
      --radius:22px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:linear-gradient(180deg,var(--bg),#eef5ff 45%,#fff5fb 100%);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    body{min-height:100vh}
    .app{max-width:1280px;margin:0 auto;padding:14px}
    .hero{
      background:linear-gradient(135deg,#3966a7,#76a9ef 58%,#f099c2);
      color:white;border-radius:28px;padding:18px 18px 16px;box-shadow:var(--shadow);position:sticky;top:0;z-index:10
    }
    .hero-top{display:flex;gap:12px;justify-content:space-between;align-items:flex-start;flex-wrap:wrap}
    .title{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;letter-spacing:.2px}
    .subtitle{opacity:.95;margin-top:6px;font-size:.95rem}
    .stats{display:flex;gap:10px;flex-wrap:wrap}
    .pill{
      background:rgba(255,255,255,.2);backdrop-filter: blur(6px);
      border:1px solid rgba(255,255,255,.25);padding:10px 12px;border-radius:999px;font-size:.9rem;font-weight:700
    }
    .tabs{display:flex;gap:8px;overflow:auto;padding-top:14px}
    .tab{
      border:none;border-radius:999px;padding:11px 14px;white-space:nowrap;
      background:rgba(255,255,255,.18);color:white;font-weight:700;cursor:pointer
    }
    .tab.active{background:white;color:var(--deep)}
    .page{display:none;padding:16px 0}
    .page.active{display:block}
    .grid{display:grid;gap:16px}
    .grid.two{grid-template-columns:330px minmax(0,1fr)}
    .grid.store{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
    @media (max-width: 900px){.grid.two{grid-template-columns:1fr}}
    .card{
      background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
      box-shadow:var(--shadow);padding:16px
    }
    .card h2,.card h3,.card h4{margin:0 0 10px}
    .muted{color:var(--muted)}
    .section-title{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .btn{
      border:none;border-radius:14px;padding:11px 14px;font-weight:800;cursor:pointer;
      background:var(--blue-strong);color:#fff;box-shadow:var(--shadow)
    }
    .btn.secondary{background:var(--pink-strong)}
    .btn.ghost{background:#fff;color:var(--deep);border:1px solid var(--border)}
    .btn.success{background:var(--success)}
    .btn.danger{background:var(--danger)}
    .btn.small{padding:8px 10px;border-radius:12px;font-size:.92rem}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .list{
      display:flex;flex-direction:column;gap:8px;max-height:72vh;overflow:auto;padding-right:4px
    }
    .item{
      border:1px solid var(--border);background:#fff;border-radius:16px;padding:12px;cursor:pointer
    }
    .item:hover{transform:translateY(-1px)}
    .item.selected{outline:2px solid var(--blue-strong);background:#f9fcff}
    .item .sub{font-size:.9rem;color:var(--muted);margin-top:3px}
    .badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 10px;font-size:.82rem;font-weight:800}
    .badge.pink{background:#fff1f7;color:var(--pink-strong)}
    .badge.blue{background:#eef6ff;color:var(--blue-strong)}
    .badge.green{background:#eefaf4;color:var(--success)}
    .progress{
      width:100%;height:12px;background:#edf1f7;border-radius:999px;overflow:hidden
    }
    .progress > div{height:100%;background:linear-gradient(90deg,var(--pink-strong),var(--blue-strong));border-radius:999px}
    .word{
      text-align:center;font-size:clamp(2rem,6vw,3.2rem);font-weight:900;letter-spacing:.2px;margin:4px 0 6px
    }
    .meta{text-align:center;color:var(--muted);margin-bottom:12px}
    .flash-content p{margin:.5rem 0}
    .flash-content .label{font-weight:800;color:var(--deep)}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media (max-width: 700px){.split{grid-template-columns:1fr}}
    .question{font-size:1.1rem;font-weight:800;margin-bottom:14px}
    .option{
      width:100%;text-align:left;border:1px solid var(--border);background:#fff;padding:12px 14px;border-radius:16px;margin-bottom:10px;cursor:pointer
    }
    .option.selected{outline:2px solid var(--pink-strong);background:#fff7fb}
    .option.correct{background:#eefaf4;border-color:#bfe6d0}
    .option.wrong{background:#fff1f4;border-color:#f0bfd0}
    .archive-item{padding:12px;border-radius:16px;border:1px solid var(--border);background:#fff}
    .store-card{display:flex;flex-direction:column;gap:10px}
    .store-emoji{font-size:2rem}
    .footer-note{font-size:.9rem;color:var(--muted)}
    .toggle{display:flex;align-items:center;gap:10px}
    .checkboxes{display:flex;flex-wrap:wrap;gap:8px}
    .mini-check{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);padding:9px 10px;border-radius:12px}
    .danger-text{color:var(--danger);font-weight:700}
    .success-text{color:var(--success);font-weight:700}
    .empty{padding:18px;border:1px dashed var(--border);border-radius:18px;background:#fff}
    .sticky-actions{position:sticky;bottom:10px;background:linear-gradient(180deg,rgba(247,251,255,0),rgba(247,251,255,.82) 40%,rgba(247,251,255,1));padding-top:10px}
    .icon-box{
      width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:#fff;border:1px solid var(--border)
    }
    .small{font-size:.92rem}
    .right{margin-left:auto}
    .headerline{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  </style>
</head>
<body>
<div class="app">
  <header class="hero">
    <div class="hero-top">
      <div>
        <div class="title">IELTS Study Buddy 💖</div>
        <div class="subtitle">Responsive website for phone + laptop. Cute, confidence-friendly, and rewards-based.</div>
      </div>
      <div class="stats">
        <div class="pill" id="statWords">🌟 0 / 0 memorized</div>
        <div class="pill" id="statChapters">📘 0 / 0 chapters</div>
        <div class="pill" id="statPoints">🪙 0 points</div>
      </div>
    </div>
    <nav class="tabs" id="tabs"></nav>
  </header>

  <main>
    <section class="page active" id="page-home"></section>
    <section class="page" id="page-daily"></section>
    <section class="page" id="page-chapters"></section>
    <section class="page" id="page-flashcards"></section>
    <section class="page" id="page-tests"></section>
    <section class="page" id="page-archive"></section>
    <section class="page" id="page-store"></section>
  </main>
</div>

<script>
const seed = {

        { title: "Present Continuous", whenToUse: "Use for actions happening now or temporary situations.", form: "Subject + am/is/are + verb-ing", examples: ["She is studying now.", "They are preparing for the exam.", "I am staying with my aunt this month."] }

    { id: crypto.randomUUID(), word:"benefit", partOfSpeech:"noun / verb", definition:"an advantage or something that helps you", zhTW:"好處；利益", example:"There are many benefits to studying daily.", chapter:1, forms:{plural:"benefits"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"approach", partOfSpeech:"noun / verb", definition:"a method or way of doing something", zhTW:"方法；途徑", example:"This approach is useful for IELTS writing.", chapter:1, forms:{plural:"approaches", past:"approached"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"context", partOfSpeech:"noun", definition:"the situation or background around something", zhTW:"背景；語境", example:"Try to understand the word in context.", chapter:1, forms:{plural:"contexts"}, isMemorized:false },

    { id: crypto.randomUUID(), word:"method", partOfSpeech:"noun", definition:"a particular way of doing something", zhTW:"方法", example:"This method helps students remember words.", chapter:1, forms:{plural:"methods"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"research", partOfSpeech:"noun / verb", definition:"careful study to discover facts", zhTW:"研究", example:"She did research before writing her essay.", chapter:1, forms:{past:"researched", ing:"researching"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"specific", partOfSpeech:"adjective", definition:"clear and exact", zhTW:"具體的；明確的", example:"Use specific examples in your answer.", chapter:1, forms:{comparative:"more specific", superlative:"most specific"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"theory", partOfSpeech:"noun", definition:"an idea or explanation of how something works", zhTW:"理論", example:"The theory sounds good but needs evidence.", chapter:1, forms:{plural:"theories"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"variable", partOfSpeech:"noun / adjective", definition:"something that can change", zhTW:"變數；可變的", example:"Price is one variable in the study.", chapter:1, forms:{plural:"variables"}, isMemorized:false },

    { id: crypto.randomUUID(), word:"occur", partOfSpeech:"verb", definition:"to happen", zhTW:"發生", example:"The problem occurred during the test.", chapter:2, forms:{past:"occurred", past_participle:"occurred", ing:"occurring"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"identify", partOfSpeech:"verb", definition:"to recognize or name something", zhTW:"辨認；確認", example:"You should identify the main trend first.", chapter:2, forms:{past:"identified", past_participle:"identified", ing:"identifying"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"policy", partOfSpeech:"noun", definition:"an official plan or set of rules", zhTW:"政策", example:"The school changed its language policy.", chapter:2, forms:{plural:"policies"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"significant", partOfSpeech:"adjective", definition:"important or large enough to be noticed", zhTW:"重要的；顯著的", example:"There was a significant increase in sales.", chapter:2, forms:{comparative:"more significant", superlative:"most significant"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"section", partOfSpeech:"noun", definition:"one part of something larger", zhTW:"部分；章節", example:"Read the first section carefully.", chapter:2, forms:{plural:"sections"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"estimate", partOfSpeech:"noun / verb", definition:"to guess a value based on available information", zhTW:"估計", example:"Can you estimate the percentage?", chapter:2, forms:{past:"estimated", past_participle:"estimated"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"evidence", partOfSpeech:"noun", definition:"facts or information showing whether something is true", zhTW:"證據", example:"Use evidence to support your opinion.", chapter:2, forms:{}, isMemorized:false },
    { id: crypto.randomUUID(), word:"maintain", partOfSpeech:"verb", definition:"to keep something at the same level or in good condition", zhTW:"維持；保養", example:"She maintained a calm tone during the interview.", chapter:2, forms:{past:"maintained", past_participle:"maintained"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"response", partOfSpeech:"noun", definition:"an answer or reaction", zhTW:"回應；回答", example:"His response was clear and direct.", chapter:2, forms:{plural:"responses"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"structure", partOfSpeech:"noun / verb", definition:"the way parts are arranged or organized", zhTW:"結構；組織", example:"A good essay needs a clear structure.", chapter:2, forms:{plural:"structures", past:"structured"}, isMemorized:false },

    { id: crypto.randomUUID(), word:"access", partOfSpeech:"noun / verb", definition:"the right or opportunity to use or get something", zhTW:"使用權；取得", example:"Students need access to good learning materials.", chapter:3, forms:{plural:"accesses"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"acquire", partOfSpeech:"verb", definition:"to get or gain something", zhTW:"獲得；取得", example:"She acquired confidence through daily practice.", chapter:3, forms:{past:"acquired", past_participle:"acquired", ing:"acquiring"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"category", partOfSpeech:"noun", definition:"a group of similar things", zhTW:"類別", example:"This word belongs to the academic category.", chapter:3, forms:{plural:"categories"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"community", partOfSpeech:"noun", definition:"a group of people living in the same area or sharing interests", zhTW:"社群；社區", example:"A supportive community helps learners grow.", chapter:3, forms:{plural:"communities"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"conclude", partOfSpeech:"verb", definition:"to decide or judge after thinking carefully", zhTW:"下結論", example:"You can conclude that the trend is upward.", chapter:3, forms:{past:"concluded", past_participle:"concluded", ing:"concluding"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"consequence", partOfSpeech:"noun", definition:"a result or effect of an action", zhTW:"結果；後果", example:"Lack of sleep can be a consequence of stress.", chapter:3, forms:{plural:"consequences"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"consume", partOfSpeech:"verb", definition:"to use something such as time, energy, or products", zhTW:"消耗；消費", example:"This task should not consume too much time.", chapter:3, forms:{past:"consumed", past_participle:"consumed", ing:"consuming"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"culture", partOfSpeech:"noun", definition:"the ideas, customs, and social behavior of a group", zhTW:"文化", example:"Food is an important part of culture.", chapter:3, forms:{plural:"cultures"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"evaluate", partOfSpeech:"verb", definition:"to judge or calculate the quality, importance, or value of something", zhTW:"評估", example:"You should evaluate both sides of the argument.", chapter:3, forms:{past:"evaluated", past_participle:"evaluated", ing:"evaluating"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"feature", partOfSpeech:"noun", definition:"an important part or characteristic of something", zhTW:"特色；特徵", example:"A key feature of the graph is the sudden drop.", chapter:3, forms:{plural:"features"}, isMemorized:false },

    { id: crypto.randomUUID(), word:"impact", partOfSpeech:"noun / verb", definition:"a strong effect or influence", zhTW:"影響；衝擊", example:"Technology has a major impact on education.", chapter:3, forms:{plural:"impacts", past:"impacted"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"maintain", partOfSpeech:"verb", definition:"to continue to have something at the same level", zhTW:"維持", example:"She maintained her confidence during the interview.", chapter:3, forms:{past:"maintained"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"obtain", partOfSpeech:"verb", definition:"to get something, especially by effort", zhTW:"獲得", example:"Students hope to obtain a band score of 6.5.", chapter:3, forms:{past:"obtained", ing:"obtaining"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"participate", partOfSpeech:"verb", definition:"to take part in an activity", zhTW:"參與", example:"She participates in class discussions more now.", chapter:3, forms:{past:"participated", ing:"participating"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"perceive", partOfSpeech:"verb", definition:"to notice, understand, or think of something in a particular way", zhTW:"察覺；理解", example:"Many students perceive speaking as the hardest part.", chapter:3, forms:{past:"perceived", ing:"perceiving"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"potential", partOfSpeech:"noun / adjective", definition:"the possibility that something will develop or happen", zhTW:"潛力；可能的", example:"She has the potential to do very well.", chapter:3, forms:{plural:"potentials"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"primary", partOfSpeech:"adjective", definition:"most important; main", zhTW:"主要的", example:"The primary goal is to build confidence.", chapter:3, forms:{comparative:"more primary"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"range", partOfSpeech:"noun", definition:"the limits within which something varies", zhTW:"範圍", example:"Use a wide range of vocabulary.", chapter:3, forms:{plural:"ranges"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"region", partOfSpeech:"noun", definition:"a particular area of a country or the world", zhTW:"地區", example:"The chart compares regions of the country.", chapter:3, forms:{plural:"regions"}, isMemorized:false },
    { id: crypto.randomUUID(), word:"source", partOfSpeech:"noun", definition:"the place something comes from", zhTW:"來源", example:"Always identify the source of the data.", chapter:3, forms:{plural:"sources"}, isMemorized:false }
  ],
  storeItems: [
    { id: crypto.randomUUID(), name:"Bubble Tea", emoji:"🧋", cost:40, note:"Sweet reward" },
    { id: crypto.randomUUID(), name:"Sushi Meal", emoji:"🍣", cost:120, note:"Fancy reward" },
    { id: crypto.randomUUID(), name:"Massage", emoji:"💆", cost:220, note:"Relax reward" },
    { id: crypto.randomUUID(), name:"Movie Night", emoji:"🎬", cost:90, note:"Fun reward" },
    { id: crypto.randomUUID(), name:"Dessert Date", emoji:"🍰", cost:70, note:"Cute reward" },
    { id: crypto.randomUUID(), name:"Coffee Treat", emoji:"☕", cost:35, note:"Quick reward" }
  ]
};

const STORAGE_KEY = "ielts-study-buddy-web-v1";

const state = loadState();

const ui = {
  tabs: [
    { id:"home", label:"🏠 Home" },
    { id:"daily", label:"💖 Daily" },
    { id:"chapters", label:"📘 Chapters" },
    { id:"flashcards", label:"🧠 Flashcards" },
    { id:"tests", label:"🎯 Tests" },
    { id:"archive", label:"📊 Archive" },
    { id:"store", label:"🛍 Store" }
  ],
  selectedChapter: state.chapters[0]?.id || 1,
  selectedWordId: null,
  flashSelection: new Set(),
  currentQuiz: [],
  currentQuizTitle: "",
  quizAnswers: {},
  selectedArchiveId: null,
  dailyWords: [],
};

function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) {
    const initial = {
      chapters: structuredClone(seed.chapters),
      words: structuredClone(seed.words),
      archive: [],
      points: 0,
      purchases: [],
      storeItems: structuredClone(seed.storeItems),
      lastEncouragement: "✨ Tiny mission: learn 20 words and do a short test."
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(initial));
    return initial;
  }
  const parsed = JSON.parse(raw);
  parsed.chapters ??= structuredClone(seed.chapters);
  parsed.words ??= structuredClone(seed.words);
  parsed.archive ??= [];
  parsed.points ??= 0;
  parsed.purchases ??= [];
  parsed.storeItems ??= structuredClone(seed.storeItems);
  parsed.lastEncouragement ??= "✨ Tiny mission: learn 20 words and do a short test.";
  return parsed;
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  renderStats();
}

function chapterWords(chapterId) {
  return state.words.filter(w => w.chapter === chapterId);
}
function memorizedCount() {
  return state.words.filter(w => w.isMemorized).length;
}
function completedCount() {
  return state.chapters.filter(c => c.isCompleted).length;
}
function findWord(id) {
  return state.words.find(w => w.id === id);
}
function setSelectedWord(id) {
  ui.selectedWordId = id;
  renderFlashcards();
}
function toggleMemorized(id, value=null) {
  const word = findWord(id);
  if (!word) return;
  word.isMemorized = value === null ? !word.isMemorized : value;
  saveState();
  renderAll();
}
function bulkMemorize(value) {
  if (ui.flashSelection.size === 0) return alert("Select one or more words first.");
  for (const id of ui.flashSelection) {
    const w = findWord(id);
    if (w) w.isMemorized = value;
  }
  saveState();
  renderFlashcards();
  renderHome();
}
function markChapterDone(id) {
  const chapter = state.chapters.find(c => c.id === id);
  if (!chapter) return;
  chapter.isCompleted = true;
  saveState();
  renderChapters();
  renderHome();
}
function randomFrom(arr, n) {
  return [...arr].sort(() => Math.random() - 0.5).slice(0, Math.min(n, arr.length));
}
function getDailyWords() {
  const remaining = state.words.filter(w => !w.isMemorized);
  const pool = remaining.length >= 20 ? remaining : state.words;
  ui.dailyWords = randomFrom(pool, 20);
  return ui.dailyWords;
}
function buildDefinitionQuiz(words, count=10) {
  const sample = randomFrom(words, count);
  const allDefs = state.words.map(w => w.definition);
  return sample.map(word => {
    const wrong = randomFrom(allDefs.filter(d => d !== word.definition), 3);
    return {
      id: crypto.randomUUID(),
      prompt: `What is the best definition of '${word.word}'?`,
      options: shuffle([...wrong, word.definition]),
      correctAnswer: word.definition,
      explanation: `'${word.word}' means: ${word.definition}`,
      yourAnswerZhTW: "",
      correctAnswerZhTW: word.zhTW
    };
  });
}
function buildFormQuiz(words, count=5) {
  const candidates = words.filter(w => w.forms && w.forms.past);
  return randomFrom(candidates, count).map(word => {
    const correct = word.forms.past;
    const wrongPool = [
      word.forms.ing, word.forms.third_person, word.forms.plural, word.word
    ].filter(Boolean).filter(x => x !== correct);
    while (wrongPool.length < 3) wrongPool.push(word.word);
    return {
      id: crypto.randomUUID(),
      prompt: `Choose the correct past form of '${word.word}'.`,
      options: shuffle([...wrongPool.slice(0,3), correct]),
      correctAnswer: correct,
      explanation: `Trusted local forms: past form of '${word.word}' is '${correct}'.`,
      yourAnswerZhTW: "",
      correctAnswerZhTW: ""
    };
  });
}
function buildQuizForChapter(chapterId) {
  const words = chapterWords(chapterId);
  ui.currentQuizTitle = `Chapter ${chapterId} Test`;
  ui.currentQuiz = [...buildDefinitionQuiz(words, 8), ...buildFormQuiz(words, 4)];
  ui.quizAnswers = {};
}
function buildMockQuiz() {
  ui.currentQuizTitle = "Mock Test";

  ui.currentQuizTitle = "Daily Test";

}
function scoreQuiz() {
  const total = ui.currentQuiz.length;
  let score = 0;
  const details = ui.currentQuiz.map(q => {
    const yourAnswer = ui.quizAnswers[q.id] || "";
    const ok = yourAnswer === q.correctAnswer;
    if (ok) score++;
    return {
      id: crypto.randomUUID(),
      question: q.prompt,
      yourAnswer,
      yourAnswerZhTW: translateSmall(yourAnswer),
      correctAnswer: q.correctAnswer,
      correctAnswerZhTW: q.correctAnswerZhTW || translateSmall(q.correctAnswer),
      explanation: q.explanation,
      isCorrect: ok
    };
  });

  const pts = pointsFor(score, total, ui.currentQuizTitle);
  state.points += pts;
  state.lastEncouragement = `🎁 +${pts} points • ${rewardReason(score, total, ui.currentQuizTitle)}`;
  state.archive.unshift({
    id: crypto.randomUUID(),
    title: ui.currentQuizTitle,
    takenAt: new Date().toISOString(),
    score,
    total,
    pointsEarned: pts,
    details
  });
  saveState();
  const record = state.archive[0];
  ui.currentQuiz = [];
  ui.quizAnswers = {};
  renderTests(`🎉 Finished! Score: ${score}/${total} • +${pts} points`);
  renderArchive(record.id);
  renderStore();
  renderHome();
}
function pointsFor(score, total, title) {
  if (!total) return 0;
  const ratio = score / total;
  let pts = 0;
  if (ratio >= 0.9) pts = 30;
  else if (ratio >= 0.8) pts = 22;
  else if (ratio >= 0.65) pts = 14;
  else if (ratio >= 0.5) pts = 8;
  else pts = 4;
  if (title === "Daily Test") pts += 4;
  if (title === "Mock Test") pts += 8;
  return pts;
}
function rewardReason(score, total, title) {
  if (!total) return "No points";
  const r = score / total;
  let label = "Effort reward";
  if (r >= .9) label = "Excellent";
  else if (r >= .8) label = "Great";
  else if (r >= .65) label = "Good";
  else if (r >= .5) label = "Solid effort";
  return `${label} in ${title}`;
}
function redeem(itemId) {
  const item = state.storeItems.find(s => s.id === itemId);
  if (!item) return;
  if (state.points < item.cost) return alert(`Not enough points for ${item.emoji} ${item.name}.`);
  state.points -= item.cost;
  state.purchases.unshift({
    id: crypto.randomUUID(),
    itemName: `${item.emoji} ${item.name}`,
    cost: item.cost,
    purchasedAt: new Date().toISOString()
  });
  state.lastEncouragement = `🎀 Redeemed ${item.emoji} ${item.name}`;
  saveState();
  renderStore();
  renderHome();
}
function deleteRecord(id) {
  state.archive = state.archive.filter(r => r.id !== id);

function translateSmall(text) {
  if (!text) return "";
  const map = {
    "to examine something carefully in detail":"仔細分析某事",
    "an advantage or something that helps you":"優點；有幫助的事",
    "a method or way of doing something":"方法",
    "the situation or background around something":"背景；語境",
    "to become better or make something better":"改善；進步",
    "to happen":"發生",
    "to recognize or name something":"辨認；確認",
    "an official plan or set of rules":"政策",
    "important or large enough to be noticed":"重要的；顯著的",
    "one part of something larger":"部分；章節"
  };
  return map[text] || "";
}
function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}
